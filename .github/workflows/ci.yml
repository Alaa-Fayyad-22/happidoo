name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-nextjs-
          # Note: This cache is only for the Next.js build cache, not for node_modules

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      # - name: Test
      #   run: npm run test

      # Blocking gate: anything high/critical that actually ships to production.
      # Dev-only advisories are excluded here so a vulnerability in a build tool
      # cannot block a deploy; they are still surfaced by the report step below.
      - name: Security audit (production dependencies)
        run: npm audit --omit=dev --audit-level=high

      # Visibility only: full tree including devDependencies. Never fails the
      # build, so it cannot block unnecessarily, but the findings stay visible
      # in the job log instead of being silently swallowed.
      - name: Security audit (full report, non-blocking)
        if: always()
        continue-on-error: true
        run: npm audit

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          ADMIN_NOTIFY_TO: ${{ secrets.ADMIN_NOTIFY_TO }}
          NEXT_PUBLIC_WHATSAPP_NUMBER: ${{ secrets.NEXT_PUBLIC_WHATSAPP_NUMBER }}

      # - name: Docker build
      #   run: docker build -t inflatables-site .

      # - name: Deploy to Vercel
      #   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      #   run: npx vercel --token=${{ secrets.VERCEL_TOKEN }} --prod --yes
      #   env:
      #     VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      #     VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}